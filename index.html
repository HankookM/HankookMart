<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 전단지</title>
    <style>
        body {
            background-color: #222;
            font-family: '맑은 고딕', sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        html { scroll-behavior: smooth; }

        .flyer-box {
            background-color: white;
            width: 100%;
            max-width: 800px;
            min-width: 200px;
            margin: 0 auto;
            border-radius: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .header-wrap { position: sticky; top: 0; z-index: 10; }
        .header, .tab-nav { background-color: #fff; }
        .header { background-color: #d32f2f; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }

        .store-info {
            background-color: #fff8e1;
            padding: 6px 12px;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid #ffe082;
        }
        .store-info div + div { margin-top: 2px; }

        .tab-nav {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-nav button {
            border: none;
            background-color: #f5f5f5;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-nav button:hover { background-color: #ffd54f; }
        .tab-nav button.active { background-color: #ffca28; color: #000; font-weight: bold; }

        .product-list { padding: 20px; }
        .product-item {
            border-bottom: 1px dashed #ccc;
            padding-bottom: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .product-item:last-child { border-bottom: none; margin-bottom: 0; }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            border: 5px solid #ff0000;
        }
        .product-name {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.25;
            margin: 10px 0 5px;
            color: #333;
        }
        @media (max-width: 640px) {
            .product-name { font-size: 18px; }
        }

        .old-price { text-decoration: line-through; color: #999; font-size: 14px; }
        .price { color: #d32f2f; font-size: 28px; font-weight: 900; }
        .price .unit { font-size: 14px; font-weight: 500; }

        .footer {
            background-color: #eee;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .scroll-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .scroll-fade.show { opacity: 1; transform: translateY(0); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .product-grid .product-item {
            margin-bottom: 0;
            padding-bottom: 10px;
            border-bottom: none;
        }

        .section-banner {
            background: linear-gradient(90deg, #ffeb3b, #fffde7);
            padding: 8px 12px;
            margin: 16px 0 8px;
            font-weight: 900;
            font-size: 16px;
            border-left: 6px solid #f57c00;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .badge-limit { background-color: #e53935; }
        .badge-new { background-color: #43a047; }

        .badge-blink { animation: badge-blink 1s steps(1, start) infinite; }
        @keyframes badge-blink { 50% { opacity: 0; } }

        .badge-pulse { animation: badge-pulse 1.2s ease-in-out infinite; }
        @keyframes badge-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.6); }
            70% { transform: scale(1.12); box-shadow: 0 0 0 10px rgba(229, 57, 53, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        .btn-top {
            position: fixed;
            right: 16px;
            bottom: 24px;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 999px;
            border: none;
            background-color: #d32f2f;
            color: #fff;
            cursor: pointer;
            opacity: 0.8;
        }
        .btn-top:hover { opacity: 1; }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="flyer-box">
        <!-- 헤더 -->
        <div class="header-wrap">
            <div class="header">
                <h1 id="store-title">로딩중...</h1>
                <p id="store-subtitle"></p>
            </div>
            <div class="store-info">
                <div id="store-name"></div>
                <div id="store-period"></div>
            </div>
            <div class="tab-nav" id="tab-nav"></div>
        </div>

        <div id="all-products" class="product-list">
            <div class="loading">상품을 불러오는 중...</div>
        </div>

        <div class="footer" id="footer"></div>
    </div>

    <button class="btn-top" onclick="scrollToSection(window.__firstSection)">▲ TOP</button>

<script>
// ============================================================
// 한국마트 전단지 - 동적 렌더링
// products.json 파일을 읽어와서 자동으로 화면을 그립니다.
// ============================================================

const DATA_URL = 'products.json?t=' + Date.now(); // 캐시 방지

async function loadFlyer() {
    try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error('데이터 로드 실패');
        const data = await res.json();
        renderFlyer(data);
    } catch (err) {
        document.getElementById('all-products').innerHTML =
            '<div class="loading">데이터를 불러올 수 없습니다.<br>' + err.message + '</div>';
    }
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderBadge(badge) {
    if (!badge || !badge.text) return '';
    const type = badge.type || 'limit';
    const anim = badge.anim ? ' badge-' + escapeHtml(badge.anim) : '';
    return `<span class="badge badge-${escapeHtml(type)}${anim}">${escapeHtml(badge.text)}</span>`;
}

function renderProduct(p) {
    const badge = renderBadge(p.badge);
    const oldPrice = p.old_price ? `<span class="old-price">${escapeHtml(p.old_price)}</span>` : '';
    const unit = p.unit ? `<span class="unit">${escapeHtml(p.unit)}</span>` : '';
    return `
        <div class="product-item scroll-fade">
            ${badge}
            <img src="${escapeHtml(p.image)}" class="product-img" loading="lazy" alt="${escapeHtml(p.name)}">
            <div class="product-name">${escapeHtml(p.name)}</div>
            ${oldPrice}
            <div class="price">${escapeHtml(p.price)}${unit}</div>
        </div>
    `;
}

function renderFlyer(data) {
    // 헤더
    const store = data.store || {};
    document.title = store.title || '오늘의 전단지';
    document.getElementById('store-title').textContent = store.title || '';
    document.getElementById('store-subtitle').textContent = store.subtitle || '';
    document.getElementById('store-name').textContent = store.name || '';
    document.getElementById('store-period').textContent =
        store.period ? '행사기간: ' + store.period : '';
    document.getElementById('footer').innerHTML =
        (store.phone ? '문의전화: ' + escapeHtml(store.phone) + '<br>' : '') +
        (store.footer_note ? escapeHtml(store.footer_note) : '');

    // 탭
    const tabNav = document.getElementById('tab-nav');
    tabNav.innerHTML = (data.sections || []).map(s =>
        `<button onclick="scrollToSection('banner-${escapeHtml(s.id)}')">${escapeHtml(s.tab_label || s.title)}</button>`
    ).join('');

    // 섹션 + 상품
    const container = document.getElementById('all-products');
    container.innerHTML = (data.sections || []).map(section => {
        const productsHtml = (section.products || []).map(renderProduct).join('');
        const wrapClass = section.layout === 'grid' ? 'product-grid' : '';
        return `
            <div id="banner-${escapeHtml(section.id)}" class="section-banner">
                ${escapeHtml(section.title)}
            </div>
            <div class="${wrapClass}">${productsHtml}</div>
        `;
    }).join('');

    // 첫 번째 섹션 ID 저장 (TOP 버튼용)
    if (data.sections && data.sections[0]) {
        window.__firstSection = 'banner-' + data.sections[0].id;
    }

    // 애니메이션 + 탭 스크롤 활성화
    initObservers(data.sections || []);
}

function initObservers(sections) {
    // 페이드인
    const targets = document.querySelectorAll('.scroll-fade');
    const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
            if (entry.isIntersecting) entry.target.classList.add('show');
            else entry.target.classList.remove('show');
        });
    }, { threshold: 0.2 });
    targets.forEach(el => fadeObserver.observe(el));

    // 탭 활성화
    const tabButtons = document.querySelectorAll('.tab-nav button');
    const sectionMap = {};
    sections.forEach((s, i) => {
        const id = 'banner-' + s.id;
        const el = document.getElementById(id);
        if (el && tabButtons[i]) sectionMap[id] = tabButtons[i];
    });

    const navObserver = new IntersectionObserver((entries) => {
        const visible = entries
            .filter(e => e.isIntersecting)
            .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        const id = visible.target.id;
        document.querySelectorAll('.tab-nav button').forEach(btn => btn.classList.remove('active'));
        if (sectionMap[id]) sectionMap[id].classList.add('active');
    }, { threshold: 0.4 });

    Object.keys(sectionMap).forEach(id => {
        const el = document.getElementById(id);
        if (el) navObserver.observe(el);
    });
}

function scrollToSection(id) {
    if (!id) return;
    const el = document.getElementById(id);
    if (!el) return;
    const headerWrap = document.querySelector('.header-wrap');
    const headerHeight = headerWrap ? headerWrap.offsetHeight : 0;
    window.scrollTo({ top: el.offsetTop - headerHeight, behavior: 'smooth' });
}

loadFlyer();
</script>

</body>
</html>
